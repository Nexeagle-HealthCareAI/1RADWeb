trigger:
  branches:
    include:
      - main

# PR validation: builds + tests run, but deploy stages are skipped via the
# Build.Reason check on each deploy stage.
pr:
  branches:
    include:
      - "*"

parameters:
  - name: deployToProd
    displayName: Promote to Production after Dev succeeds?
    type: boolean
    default: false
  - name: publishDesktopInstaller
    displayName: Upload the desktop installer to Blob after Prod?
    type: boolean
    default: false
  - name: signDesktopInstaller
    displayName: Code-sign the desktop installer? (requires cert secure file)
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'         # Node LTS

  # ── API URLs baked into the Vite build (VITE_API_URL is read at build
  # time only; the bundle must be rebuilt per environment).
  devApiUrl:  'https://1radapi-bch4ere7a6cmgkap.centralindia-01.azurewebsites.net/api/v1'
  prodApiUrl: 'https://1radapiprod-h6bxhde8hgdtctee.centralindia-01.azurewebsites.net/api/v1'

stages:
  # ────────────────────────────────────────────────────────────────────────
  # Stage 1 — Build React (runs on main push AND on every PR for CI)
  # The exact same dist/ artifact is reused by both Dev and Prod deploys,
  # guaranteeing the two environments serve identical bundles.
  # ────────────────────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build React (Dev + Prod bundles)
    jobs:
      # ── BuildDev — bundle that points at the Dev API ────────────────────
      - job: BuildDev
        displayName: Build for Dev (VITE_API_URL = dev API)
        timeoutInMinutes: 30
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: Use Node $(nodeVersion)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Build.SourcesDirectory)/node_modules
            displayName: Cache node_modules

          - script: |
              npm ci
              VITE_API_URL="$(devApiUrl)" npm run build
            workingDirectory: $(Build.SourcesDirectory)
            displayName: npm ci & build (Dev API URL)

          - task: PublishPipelineArtifact@1
            displayName: Publish Dev dist artifact
            inputs:
              targetPath: '$(Build.SourcesDirectory)/dist'
              artifact: 'web-dist-dev'
              publishLocation: 'pipeline'

      # ── BuildProd — bundle that points at the Prod API ──────────────────
      # Skipped on PR builds (Dev build is enough for CI validation).
      - job: BuildProd
        displayName: Build for Prod (VITE_API_URL = prod API)
        condition: ne(variables['Build.Reason'], 'PullRequest')
        timeoutInMinutes: 30
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: Use Node $(nodeVersion)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Build.SourcesDirectory)/node_modules
            displayName: Cache node_modules

          - script: |
              npm ci
              VITE_API_URL="$(prodApiUrl)" npm run build
            workingDirectory: $(Build.SourcesDirectory)
            displayName: npm ci & build (Prod API URL)

          - task: PublishPipelineArtifact@1
            displayName: Publish Prod dist artifact
            inputs:
              targetPath: '$(Build.SourcesDirectory)/dist'
              artifact: 'web-dist-prod'
              publishLocation: 'pipeline'

      # ── BuildDesktop — package the Windows desktop installer ────────────
      # Runs on a Windows agent (native NSIS build — no Wine), only when a
      # prod promotion is requested. Bakes the Prod API URL into the bundle,
      # then electron-builder packages release/1Rad-Setup.exe, published as
      # the 'desktop-installer' artifact for the PublishDesktop stage.
      - job: BuildDesktop
        displayName: Package Windows desktop installer
        condition: and(ne(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.deployToProd }}', true))
        pool:
          vmImage: windows-latest
        timeoutInMinutes: 45
        # api-prod-secrets holds ProdAzureBlobConnectionString + desktopBlobContainer,
        # used to derive the auto-update feed URL baked into the app (app-update.yml)
        # so it matches where PublishDesktop uploads the feed.
        variables:
          - group: api-prod-secrets
        steps:
          - checkout: self
            clean: true

          # Version-bump guard — only when actually publishing an update.
          # Auto-update is version-comparison: if package.json's version isn't
          # greater than what's already live in the feed, installed clients will
          # never update. Fail fast (before the long build) so it can't ship.
          # First release (no latest.yml yet → 404) passes.
          - ${{ if eq(parameters.publishDesktopInstaller, true) }}:
            - task: PowerShell@2
              displayName: Verify version was bumped
              inputs:
                pwsh: true
                targetType: inline
                workingDirectory: $(Build.SourcesDirectory)
                script: |
                  $acct = ((($env:BLOB_CONN -split ';') | Where-Object { $_ -like 'AccountName=*' }) -replace 'AccountName=','').Trim()
                  $pkg = Get-Content package.json -Raw | ConvertFrom-Json
                  $local = [version]$pkg.version
                  $feed = "https://$acct.blob.core.windows.net/$(desktopBlobContainer)/latest.yml"
                  try {
                    $resp = Invoke-WebRequest -Uri $feed -UseBasicParsing -ErrorAction Stop
                    $line = ($resp.Content -split "`n" | Where-Object { $_ -match '^version:' })[0]
                    $published = [version](($line -replace 'version:\s*','').Trim())
                    if ($local -le $published) {
                      Write-Error "package.json version $local is NOT greater than the published $published. Bump the version before publishing a desktop update."
                      exit 1
                    }
                    Write-Host "Version check OK: local $local > published $published"
                  } catch {
                    if ($_.Exception.Response -and $_.Exception.Response.StatusCode.value__ -eq 404) {
                      Write-Host "No published latest.yml yet (first release) - skipping version check."
                    } else {
                      Write-Host "Could not read published feed: $($_.Exception.Message) - skipping version check."
                    }
                  }
              env:
                BLOB_CONN: $(ProdAzureBlobConnectionString)

          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: Use Node $(nodeVersion)

          - script: npm ci
            workingDirectory: $(Build.SourcesDirectory)
            displayName: npm ci

          # Bake the Prod API URL, then build the web bundle electron wraps.
          # VITE_TARGET=electron switches Vite to a relative base ('./') so the
          # packaged app's assets load over file:// (otherwise → white screen).
          - script: |
              set VITE_API_URL=$(prodApiUrl)
              set VITE_TARGET=electron
              npm run build
            workingDirectory: $(Build.SourcesDirectory)
            displayName: Vite build (Prod API URL, Electron base)

          # Code-signing (optional). Upload an OV code-signing certificate as a
          # DevOps Secure File named '1rad-codesign.pfx' and add CSC_KEY_PASSWORD
          # (secret) to the sql-prod-secrets group, then queue with
          # signDesktopInstaller = true. electron-builder picks up CSC_LINK +
          # CSC_KEY_PASSWORD automatically and signs the installer.
          - ${{ if eq(parameters.signDesktopInstaller, true) }}:
            - task: DownloadSecureFile@1
              name: codeCert
              displayName: Download code-signing certificate
              inputs:
                secureFile: '1rad-codesign.pfx'

          # Package the NSIS installer AND the update feed (latest.yml +
          # .blockmap). The Blob feed URL (baked into the app so electron-updater
          # knows where to check) is derived from the AccountName in
          # ProdAzureBlobConnectionString, so there's no separate account-name var.
          - task: PowerShell@2
            displayName: Package installer + update feed (electron-builder)
            inputs:
              pwsh: true
              workingDirectory: $(Build.SourcesDirectory)
              targetType: inline
              script: |
                $acct = ((($env:BLOB_CONN -split ';') | Where-Object { $_ -like 'AccountName=*' }) -replace 'AccountName=','').Trim()
                if (-not $acct) { Write-Error 'Could not parse AccountName from ProdAzureBlobConnectionString'; exit 1 }
                $feed = "https://$acct.blob.core.windows.net/$(desktopBlobContainer)/"
                Write-Host "Auto-update feed: $feed"
                npx electron-builder --win "-c.publish.provider=generic" "-c.publish.url=$feed"
            env:
              BLOB_CONN: $(ProdAzureBlobConnectionString)
              ${{ if eq(parameters.signDesktopInstaller, true) }}:
                CSC_LINK: $(codeCert.secureFilePath)
                CSC_KEY_PASSWORD: $(CSC_KEY_PASSWORD)

          # Stage only the files the auto-updater needs (skip the bulky
          # win-unpacked/ folder) for a lean artifact + clean blob upload.
          - script: |
              mkdir "$(Build.ArtifactStagingDirectory)\desktop"
              copy "release\1Rad-Setup.exe" "$(Build.ArtifactStagingDirectory)\desktop\"
              copy "release\1Rad-Setup.exe.blockmap" "$(Build.ArtifactStagingDirectory)\desktop\"
              copy "release\latest.yml" "$(Build.ArtifactStagingDirectory)\desktop\"
            workingDirectory: $(Build.SourcesDirectory)
            displayName: Stage update feed

          - task: PublishPipelineArtifact@1
            displayName: Publish desktop installer artifact
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/desktop'
              artifact: 'desktop-installer'
              publishLocation: 'pipeline'

  # ────────────────────────────────────────────────────────────────────────
  # Stage 2 — Deploy to Dev SWA
  # Auto-deploys on every push to main. Skipped on PR builds (build-only).
  # Uses the Dev SWA token from the 'swa-dev-secrets' variable group.
  # ────────────────────────────────────────────────────────────────────────
  - stage: DeployDev
    displayName: Deploy to Dev (SWA)
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    variables:
      # SWA_TOKEN_DEV lives in the 'api-dev-secrets' variable group. The macro
      # $(SWA_TOKEN_DEV) only resolves if it's defined in a referenced group —
      # otherwise it passes through literally and the SWA CLI reports
      # "deployment_token provided was invalid".
      - group: api-dev-secrets
    jobs:
      - deployment: DeployDev
        displayName: Push to Dev Static Web App
        environment: 'Dev-SWA'
        timeoutInMinutes: 30
        strategy:
          runOnce:
            deploy:
              steps:
                # Checkout is required so the SWA Docker container has a
                # source directory to mount (it ignores $(Pipeline.Workspace);
                # only $(Build.SourcesDirectory) is bind-mounted as
                # /working_dir/ inside the container).
                - checkout: self
                  clean: true

                # Download the build artifact INTO the source dir, so the
                # SWA container can see it under /working_dir/dist.
                # (Must use the full DownloadPipelineArtifact@2 task — the
                # `- download:` shorthand doesn't accept a custom path.)
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Dev bundle into source dir'
                  inputs:
                    buildType: 'current'
                    artifactName: 'web-dist-dev'
                    targetPath: '$(Build.SourcesDirectory)/dist'

                - task: AzureStaticWebApp@0
                  displayName: Deploy to Azure Static Web Apps (Dev)
                  inputs:
                    app_location: 'dist'        # relative to repo root
                    output_location: ''
                    api_location: ''
                    skip_app_build: true
                    skip_api_build: true
                    verbose: true
                    azure_static_web_apps_api_token: $(SWA_TOKEN_DEV)

  # ────────────────────────────────────────────────────────────────────────
  # Stage 3 — Deploy to Prod SWA
  # Runs ONLY when:
  #   (1) Dev deploy succeeded
  #   (2) The run was queued with deployToProd: true
  #   (3) An approver clicks Approve on the 'Production-SWA' environment.
  #
  # Approval is configured in Azure DevOps → Pipelines → Environments →
  # Production-SWA → Approvals and checks.
  # ────────────────────────────────────────────────────────────────────────
  - stage: DeployProd
    displayName: Deploy to Prod (SWA)
    dependsOn: DeployDev
    condition: and(succeeded(), eq('${{ parameters.deployToProd }}', true), ne(variables['Build.Reason'], 'PullRequest'))
    variables:
      # SWA_TOKEN_PROD lives in the 'api-prod-secrets' variable group (same
      # group as ProdAzureBlobConnectionString). Must be named exactly
      # SWA_TOKEN_PROD so the $(SWA_TOKEN_PROD) macro below resolves.
      - group: api-prod-secrets
    jobs:
      - deployment: DeployProd
        displayName: Push to Prod Static Web App
        environment: 'Production-SWA'
        timeoutInMinutes: 60
        strategy:
          runOnce:
            deploy:
              steps:
                # Same mounting fix as DeployDev: SWA's container only mounts
                # $(Build.SourcesDirectory), so we checkout the repo and
                # download the artifact INTO that directory.
                - checkout: self
                  clean: true

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Prod bundle into source dir'
                  inputs:
                    buildType: 'current'
                    artifactName: 'web-dist-prod'
                    targetPath: '$(Build.SourcesDirectory)/dist'

                - script: |
                    echo "===== PROD DEPLOY ====="
                    echo "Commit:     $(Build.SourceVersion)"
                    echo "Branch:     $(Build.SourceBranchName)"
                    echo "Queued by:  $(Build.RequestedFor)"
                    echo "Pipeline:   $(Build.BuildNumber)"
                  displayName: Prod deploy audit log

                - task: AzureStaticWebApp@0
                  displayName: Deploy to Azure Static Web Apps (Prod)
                  inputs:
                    app_location: 'dist'        # relative to repo root
                    output_location: ''
                    api_location: ''
                    skip_app_build: true
                    skip_api_build: true
                    verbose: true
                    azure_static_web_apps_api_token: $(SWA_TOKEN_PROD)

  # ────────────────────────────────────────────────────────────────────────
  # Stage 4 — Publish desktop installer to Azure Blob Storage
  # Runs only when BOTH parameters are true (deployToProd + publishDesktopInstaller),
  # after a successful Prod deploy. Uploads release/1Rad-Setup.exe to a blob; the
  # API's GET /download/desktop then redirects to it (set DesktopApp:InstallerUrl
  # in the API config to the blob's public URL).
  #
  # ▶ One-time setup before enabling — in the 'api-prod-secrets' group:
  #     • ProdAzureBlobConnectionString — your prod storage connection string
  #       (carries AccountName + AccountKey; auth needs no RBAC role) — already set
  #     • desktopBlobContainer          — e.g. downloads (public-read, or CDN-fronted)
  #   Then set the API app setting DesktopApp:InstallerUrl to
  #   https://<account>.blob.core.windows.net/<container>/1Rad-Setup.exe
  # ────────────────────────────────────────────────────────────────────────
  #
  # Compile-time gated: only emitted when publishDesktopInstaller = true, so the
  # extra stage stays out of normal runs entirely.
  - ${{ if eq(parameters.publishDesktopInstaller, true) }}:
    - stage: PublishDesktop
      displayName: Publish desktop installer (Blob)
      dependsOn: DeployProd
      condition: and(succeeded(), eq('${{ parameters.deployToProd }}', true), ne(variables['Build.Reason'], 'PullRequest'))
      variables:
        - group: api-prod-secrets
      jobs:
        - deployment: PublishDesktop
          displayName: Upload installer to Blob Storage
          environment: 'Production-SWA'
          timeoutInMinutes: 30
          strategy:
            runOnce:
              deploy:
                steps:
                  - download: current
                    artifact: desktop-installer

                  # Upload the whole feed (1Rad-Setup.exe + .blockmap + latest.yml).
                  # latest.yml is what installed apps poll to detect a new version,
                  # so all three must land together for auto-update to work.
                  # Connection-string auth → no service connection / RBAC needed.
                  # az CLI is preinstalled on the ubuntu-latest agent.
                  - script: |
                      az storage blob upload-batch \
                        --connection-string "$BLOB_CONN" \
                        --destination "$(desktopBlobContainer)" \
                        --source "$(Pipeline.Workspace)/desktop-installer" \
                        --overwrite true
                    displayName: Upload installer + update feed to Blob
                    env:
                      BLOB_CONN: $(ProdAzureBlobConnectionString)
