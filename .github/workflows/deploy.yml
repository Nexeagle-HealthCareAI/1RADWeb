# ═══════════════════════════════════════════════════════════════════════════════
# 1RAD EasyRad — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
# STAGES:
#   Stage 1 — Build          npm ci + vite build → uploads dist/ artifact
#   Stage 2 — Deploy Dev     scp dist/ to VM + nginx reload  (develop branch)
#   Stage 3 — Electron       builds Windows .exe installer   (develop + main)
#   Stage 4 — Deploy Prod    scp dist/ to Prod VM            (main + approval)
#
# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS  (repo → Settings → Secrets → Actions)
# ─────────────────────────────────────────────────────────────────────────────
#   DEV_SSH_HOST        151.185.45.77
#   DEV_SSH_USER        root
#   DEV_SSH_KEY_B64     base64-encoded private key  (see setup note below)
#   PROD_SSH_HOST       Prod VM IP
#   PROD_SSH_USER       root
#   PROD_SSH_KEY_B64    base64-encoded private key for prod VM
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME VM SETUP (run once on the Dev VM)
# ─────────────────────────────────────────────────────────────────────────────
#   mkdir -p /var/www/easyrad
#   apt install debian-keyring debian-archive-keyring apt-transport-https -y
#   curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
#   curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
#   apt update
#   apt install caddy -y
#   # Replace /etc/caddy/Caddyfile with the config below
#   caddy reload --config /etc/caddy/Caddyfile
#
# CADDY CONFIG  →  /etc/caddy/Caddyfile
# ─────────────────────────────────────────────────────────────────────────────
# :85 {
#     root * /var/www/easyrad
#
#     # ---- API reverse proxy (same-origin) ----
#     # Proxy API requests to backend ASP.NET container
#     # (Make sure proxy timeout covers large DICOM zip files)
#     handle /api/* {
#         reverse_proxy http://127.0.0.1:5000 {
#             flush_interval -1
#         }
#     }
#
#     # SPA — all routes fall back to index.html
#     handle {
#         try_files {path} /index.html
#         file_server
#     }
#
#     # Security headers
#     header {
#         Cross-Origin-Embedder-Policy "require-corp"
#         Cross-Origin-Opener-Policy "same-origin"
#         X-Frame-Options "SAMEORIGIN"
#         X-Content-Type-Options "nosniff"
#     }
#
#     # Cache static assets
#     @static {
#         file
#         path *.js *.css *.png *.jpg *.ico *.woff2 *.svg
#     }
#     header @static Cache-Control "public, immutable, max-age=31536000"
# }
# ═══════════════════════════════════════════════════════════════════════════════

name: EasyRad — CI/CD

on:
  push:
    branches:
      - develop   # → builds + deploys to Dev
      - main      # → builds + deploys to Prod (with approval)
  pull_request:
    branches:
      - develop
      - main      # → build only, no deploy
  workflow_dispatch:

concurrency:
  group: easyrad-cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — BUILD
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  build:
    name: "Stage 1 — Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_TARGET: web
          # Same-origin VM deploy: nginx proxies /api/* to the API container, so a
          # relative base URL works on any VM running the proxy (no CORS needed).
          # Pipeline env wins over .env.production, so the Azure Static Web App
          # build (driven by azure-pipelines.yml) is unaffected.
          VITE_API_URL: /api/v1

      - name: Cache dist artifact
        uses: actions/cache/save@v4
        with:
          path: dist/
          key: easyrad-dist-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Write build summary
        if: always()
        run: |
          echo "## 🔨 Build" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Passed" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — DEPLOY DEV
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-dev:
    name: "Stage 2 — Deploy → Dev"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Restore dist artifact
        uses: actions/cache/restore@v4
        with:
          path: dist/
          key: easyrad-dist-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.DEV_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key_dev
          chmod 600 /tmp/deploy_key_dev

      - name: Ensure web root exists on VM
        run: |
          ssh -i /tmp/deploy_key_dev \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} \
              'mkdir -p /var/www/easyrad'

      - name: Copy dist to VM
        run: |
          scp -i /tmp/deploy_key_dev \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -r dist/* \
              ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}:/var/www/easyrad/

      - name: Reload caddy
        run: |
          ssh -i /tmp/deploy_key_dev \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} \
              'caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || systemctl reload caddy 2>/dev/null || true'

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.DEV_SSH_HOST }}:85/ 2>/dev/null || echo "000")
          echo "Health check: HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ EasyRad is up" || echo "⚠️  Got HTTP $STATUS — check caddy on the VM"

      - name: Write deploy summary
        if: always()
        run: |
          echo "## 🚀 Deploy — Dev" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Deployed" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | http://${{ secrets.DEV_SSH_HOST }}:85 |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — ELECTRON INSTALLER (Windows .exe)
# ═══════════════════════════════════════════════════════════════════════════════
  electron:
    name: "Stage 3 — Electron Installer (.exe)"
    runs-on: windows-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron installer
        env:
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && vars.PROD_API_URL || vars.DEV_API_URL }}
          STORAGE_ENDPOINT: ${{ github.ref == 'refs/heads/main' && vars.PROD_STORAGE_ENDPOINT || vars.DEV_STORAGE_ENDPOINT }}
          STORAGE_BUCKET: ${{ github.ref == 'refs/heads/main' && vars.PROD_STORAGE_BUCKET || vars.DEV_STORAGE_BUCKET }}
        shell: bash
        run: |
          # Strip trailing slash from endpoint just in case, then construct the feed URL
          ENDPOINT="${STORAGE_ENDPOINT%/}"
          FEED_URL="$ENDPOINT/$STORAGE_BUCKET/downloads/"
          echo "Baking feed URL into installer: $FEED_URL"
          npm run dist:win -- -c.publish.provider=generic -c.publish.url=$FEED_URL

      - name: Upload installer to E2E Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.PROD_STORAGE_ACCESS_KEY || secrets.DEV_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.PROD_STORAGE_SECRET_KEY || secrets.DEV_STORAGE_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.STORAGE_REGION }}
          STORAGE_ENDPOINT: ${{ github.ref == 'refs/heads/main' && vars.PROD_STORAGE_ENDPOINT || vars.DEV_STORAGE_ENDPOINT }}
          STORAGE_BUCKET: ${{ github.ref == 'refs/heads/main' && vars.PROD_STORAGE_BUCKET || vars.DEV_STORAGE_BUCKET }}
        shell: bash
        run: |
          aws s3 cp release/ s3://$STORAGE_BUCKET/downloads/ \
            --endpoint-url $STORAGE_ENDPOINT \
            --recursive \
            --exclude "*" \
            --include "*.exe" \
            --include "*.blockmap" \
            --include "latest.yml" \
            --acl public-read

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: 1rad-installer-${{ github.run_number }}
          path: release/*.exe
          retention-days: 30

      - name: Write electron summary
        if: always()
        shell: bash
        run: |
          echo "## 💿 Electron Installer" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Built — download from Artifacts" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`1rad-installer-${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Retention | 30 days |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — DEPLOY PROD
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: "Stage 4 — Deploy → Prod"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production    # ← requires manual approval in GitHub

    steps:
      - name: Restore dist artifact
        uses: actions/cache/restore@v4
        with:
          path: dist/
          key: easyrad-dist-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Ensure web root exists on VM
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
              'mkdir -p /var/www/easyrad'

      - name: Copy dist to Prod VM
        run: |
          scp -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -r dist/* \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/var/www/easyrad/

      - name: Reload caddy
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
              'caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || systemctl reload caddy 2>/dev/null || true'

      - name: Write deploy summary
        if: always()
        run: |
          echo "## 🚀 Deploy — Prod" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Deployed to Production" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Approved by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
