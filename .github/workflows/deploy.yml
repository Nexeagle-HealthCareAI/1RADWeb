# ═══════════════════════════════════════════════════════════════════════════════
# 1RAD EasyRad — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
# STAGES:
#   Stage 1 — Build          npm ci + vite build → uploads dist/ artifact
#   Stage 2 — Deploy Dev     scp dist/ to VM + nginx reload  (develop branch)
#   Stage 3 — Electron       builds Windows .exe installer   (develop + main)
#   Stage 4 — Deploy Prod    scp dist/ to Prod VM            (main + approval)
#
# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS  (repo → Settings → Secrets → Actions)
# ─────────────────────────────────────────────────────────────────────────────
#   DEV_SSH_HOST        151.185.45.77
#   DEV_SSH_USER        root
#   DEV_SSH_KEY_B64     base64-encoded private key  (see setup note below)
#   PROD_SSH_HOST       Prod VM IP
#   PROD_SSH_USER       root
#   PROD_SSH_KEY_B64    base64-encoded private key for prod VM
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME VM SETUP (run once on the Dev VM)
# ─────────────────────────────────────────────────────────────────────────────
#   mkdir -p /var/www/easyrad
#   apt install nginx -y
#   # Copy the nginx config below to /etc/nginx/sites-available/easyrad
#   ln -s /etc/nginx/sites-available/easyrad /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# NGINX CONFIG  →  /etc/nginx/sites-available/easyrad
# ─────────────────────────────────────────────────────────────────────────────
#   server {
#       listen 3000;
#       root /var/www/easyrad;
#       index index.html;
#
#       # SPA — all routes fall back to index.html
#       location / {
#           try_files $uri $uri/ /index.html;
#       }
#
#       # Security headers
#       add_header Cross-Origin-Embedder-Policy "require-corp";
#       add_header Cross-Origin-Opener-Policy "same-origin";
#       add_header X-Frame-Options "SAMEORIGIN";
#       add_header X-Content-Type-Options "nosniff";
#
#       # Cache static assets aggressively (Vite hashes filenames)
#       location ~* \.(js|css|png|jpg|ico|woff2|svg)$ {
#           expires 1y;
#           add_header Cache-Control "public, immutable";
#       }
#   }
# ═══════════════════════════════════════════════════════════════════════════════

name: EasyRad — CI/CD

on:
  push:
    branches:
      - develop   # → builds + deploys to Dev
      - main      # → builds + deploys to Prod (with approval)
  pull_request:
    branches:
      - develop
      - main      # → build only, no deploy
  workflow_dispatch:

concurrency:
  group: easyrad-cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — BUILD
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  build:
    name: "Stage 1 — Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_TARGET: web

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyrad-dist
          path: dist/
          retention-days: 1

      - name: Write build summary
        if: always()
        run: |
          echo "## 🔨 Build" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Passed" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — DEPLOY DEV
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-dev:
    name: "Stage 2 — Deploy → Dev"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: easyrad-dist
          path: dist/

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.DEV_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Ensure web root exists on VM
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} \
              'mkdir -p /var/www/easyrad'

      - name: Copy dist to VM
        run: |
          scp -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -r dist/* \
              ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}:/var/www/easyrad/

      - name: Reload nginx
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} \
              'nginx -s reload 2>/dev/null || systemctl reload nginx 2>/dev/null || true'

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.DEV_SSH_HOST }}:3000/ 2>/dev/null || echo "000")
          echo "Health check: HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ EasyRad is up" || echo "⚠️  Got HTTP $STATUS — check nginx on the VM"

      - name: Write deploy summary
        if: always()
        run: |
          echo "## 🚀 Deploy — Dev" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Deployed" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | http://${{ secrets.DEV_SSH_HOST }}:3000 |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — ELECTRON INSTALLER (Windows .exe)
# ═══════════════════════════════════════════════════════════════════════════════
  electron:
    name: "Stage 3 — Electron Installer (.exe)"
    runs-on: windows-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron installer
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1rad-installer-${{ github.run_number }}
          path: release/*.exe
          retention-days: 30

      - name: Write electron summary
        if: always()
        shell: bash
        run: |
          echo "## 💿 Electron Installer" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Built — download from Artifacts" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`1rad-installer-${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Retention | 30 days |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — DEPLOY PROD
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: "Stage 4 — Deploy → Prod"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production    # ← requires manual approval in GitHub

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: easyrad-dist
          path: dist/

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Ensure web root exists on VM
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
              'mkdir -p /var/www/easyrad'

      - name: Copy dist to Prod VM
        run: |
          scp -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -r dist/* \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/var/www/easyrad/

      - name: Reload nginx
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
              'nginx -s reload 2>/dev/null || systemctl reload nginx 2>/dev/null || true'

      - name: Write deploy summary
        if: always()
        run: |
          echo "## 🚀 Deploy — Prod" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Deployed to Production" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Approved by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
